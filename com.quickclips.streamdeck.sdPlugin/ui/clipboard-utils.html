<!doctype html>
<html>

<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Paste Mode">
        <sdpi-select setting="pasteMode">
            <option value="typing">Simulate Typing (default)</option>
            <option value="clipboard">Clipboard Paste</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Transform">
        <sdpi-select setting="transform">
            <option value="">— Select a transform —</option>
            <option value="count">Count (words, chars, lines)</option>
            <option value="base64encode">base64 encode</option>
            <option value="base64decode">base64 decode</option>
            <option value="camelCase">camelCase</option>
            <option value="dashcase">dash-case</option>
            <option value="lower">lower</option>
            <option value="snakecase">snake_case</option>
            <option value="titlecase">Title Case</option>
            <option value="trim">Trim whitespace</option>
            <option value="upper">UPPER</option>
            <option value="urlencode">URL encode</option>
            <option value="urldecode">URL decode</option>
        </sdpi-select>
    </sdpi-item>
</body>

</html>
