<!doctype html>
<html>

<head lang="en">
    <meta charset="utf-8" />
    <script src="sdpi-components.js"></script>
</head>

<body>
    <sdpi-item label="Paste Mode">
        <sdpi-select setting="pasteMode">
            <option value="typing">Simulate Typing (default)</option>
            <option value="clipboard">Clipboard Paste</option>
        </sdpi-select>
    </sdpi-item>

    <sdpi-item label="Prevent Clear">
        <sdpi-checkbox setting="suppressClear">Disable hold-to-clear functionality</sdpi-checkbox>
    </sdpi-item>

    <sdpi-item label="Clear Slot">
        <sdpi-button id="clearButton">Clear Content</sdpi-button>
    </sdpi-item>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const button = document.getElementById('clearButton');
            if (button) {
                button.addEventListener('click', () => {
                    SDPIComponents.streamDeckClient.send('sendToPlugin', { event: 'clearSlot' });
                });
            }
        });
    </script>
</body>

</html>
